<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근 거부 - TTS Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard Variable"', '"Pretendard"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: { 0: '#0a0a0f', 1: '#12121a' },
                        coral: { DEFAULT: '#ff6b6b', light: '#ff8787' },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
</head>
<body class="min-h-screen bg-surface-0 font-sans text-white antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute left-1/2 top-1/3 h-[500px] w-[500px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-coral/[0.06] blur-[120px]"></div>
    </div>

    <div class="flex min-h-screen flex-col items-center justify-center px-4">
        <div class="w-full max-w-sm rounded-2xl border border-white/[0.08] bg-surface-1/80 p-10 text-center backdrop-blur-xl">
            <div class="mb-6 flex justify-center">
                <div class="flex h-16 w-16 items-center justify-center rounded-full bg-coral/15">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-coral" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                </div>
            </div>
            <h1 class="text-xl font-bold">접근 불가</h1>
            <p class="mt-2 text-sm text-white/50"><span class="font-medium text-white/70">{{ user.username }}</span> 계정은 대시보드에 접근할 수 없습니다</p>
            <div class="mt-6 rounded-xl bg-white/[0.03] px-4 py-3">
                <p class="text-xs text-white/30">대시보드는 봇 관리자 전용입니다</p>
            </div>
            <a href="/login" class="mt-6 inline-block text-sm font-medium text-white/40 transition hover:text-white/60">
                &larr; 다시 로그인
            </a>
        </div>
    </div>
</body>
</html>
