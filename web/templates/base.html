<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TTS Bot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard Variable"', '"Pretendard"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
                    },
                    colors: {
                        surface: {
                            0: '#0a0a0f',
                            1: '#12121a',
                            2: '#1a1a25',
                            3: '#222230',
                        },
                        accent: {
                            DEFAULT: '#6c5ce7',
                            light: '#a29bfe',
                            dim: '#6c5ce7',
                            subtle: 'rgba(108, 92, 231, 0.12)',
                        },
                        mint: {
                            DEFAULT: '#00cec9',
                            light: '#81ecec',
                            subtle: 'rgba(0, 206, 201, 0.12)',
                        },
                        coral: {
                            DEFAULT: '#ff6b6b',
                            light: '#ff8787',
                            subtle: 'rgba(255, 107, 107, 0.12)',
                        },
                        sun: {
                            DEFAULT: '#ffc048',
                            light: '#ffd271',
                            subtle: 'rgba(255, 192, 72, 0.12)',
                        },
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
        ::selection { background: rgba(108, 92, 231, 0.3); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-surface-0 font-sans text-white/90 antialiased">
    <!-- Ambient background -->
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute -left-40 -top-40 h-[600px] w-[600px] rounded-full bg-accent/[0.07] blur-[120px]"></div>
        <div class="absolute -bottom-32 -right-32 h-[500px] w-[500px] rounded-full bg-mint/[0.05] blur-[120px]"></div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-white/[0.06] bg-surface-0/80 backdrop-blur-xl">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
            <a href="/" class="flex items-center gap-3 transition hover:opacity-80">
                <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
                <span class="text-[15px] font-semibold tracking-tight">TTS Bot</span>
            </a>
            <div class="flex items-center gap-2">
                <a href="/" class="rounded-lg px-3 py-2 text-[13px] font-medium text-white/50 transition hover:bg-white/[0.06] hover:text-white/80">대시보드</a>
                <div class="mx-1 h-4 w-px bg-white/10"></div>
                <span class="rounded-lg bg-white/[0.04] px-3 py-1.5 text-[13px] font-medium text-white/40">{{ session.get('username', '') }}</span>
                <a href="/logout" class="rounded-lg px-3 py-2 text-[13px] font-medium text-coral/70 transition hover:bg-coral/10 hover:text-coral">로그아웃</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
