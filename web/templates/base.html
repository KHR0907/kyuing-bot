<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TTS Bot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(14,165,233,0.16),_transparent_35%),radial-gradient(circle_at_right,_rgba(56,189,248,0.08),_transparent_30%)]"></div>
    <nav class="border-b border-slate-800 bg-slate-950/90 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
            <a href="/" class="text-lg font-semibold tracking-wide text-cyan-300">TTS Bot Monitor</a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm text-slate-300 transition hover:text-cyan-300">대시보드</a>
                <span class="text-sm text-slate-500">{{ session.get('username', '') }}</span>
                <a href="/logout" class="text-sm text-rose-400 transition hover:text-rose-300">로그아웃</a>
            </div>
        </div>
    </nav>
    <main class="mx-auto max-w-6xl px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
